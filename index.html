<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Frontenac Fire Watch</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0f172a; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        /* UI Overlay */
        #ui-overlay {
            position: absolute; top: 24px; left: 24px; z-index: 10;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px);
            color: #fff; padding: 24px; border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            min-width: 300px; max-width: 380px; max-height: 80vh; overflow-y: auto;
        }
        .header {
            display: flex; align-items: center; justify-content: space-between;
            gap: 12px; margin-bottom: 16px; padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .header-title { display: flex; align-items: center; gap: 12px; }
        .fire-icon {
            width: 28px; height: 28px; background: linear-gradient(135deg, #ef4444, #f97316);
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0;
        }
        h1 { font-size: 18px; font-weight: 700; color: #fff; }
        .subtitle { font-size: 12px; color: #94a3b8; margin-top: 2px; }
        .reset-btn {
            background: none; border: none; color: #94a3b8; cursor: pointer;
            font-size: 18px; padding: 4px; border-radius: 4px; transition: color 0.2s;
        }
        .reset-btn:hover { color: #fff; background: rgba(255,255,255,0.1); }
        
        .status-card {
            background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px; padding: 14px; margin: 8px 0;
            transition: all 0.2s ease; cursor: pointer;
        }
        .status-card:hover { background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.15); }
        .status-card.active {
            background: rgba(59, 130, 246, 0.15); border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
        }
        .status-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .township-name { font-size: 14px; font-weight: 600; color: #e2e8f0; }
        .status-badge {
            display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px;
            border-radius: 16px; font-size: 11px; font-weight: 600; text-transform: uppercase;
        }
        .status-badge.on { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.25); }
        .status-badge.off { background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.25); }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
        .status-info {
            font-size: 12px; color: #94a3b8; display: flex; justify-content: space-between;
            align-items: center; margin-top: 8px;
        }
        .status-info a {
            color: #60a5fa; text-decoration: none; font-weight: 500;
            display: flex; align-items: center; gap: 4px;
        }
        .status-info a:hover { text-decoration: underline; }
        #last-updated {
            font-size: 11px; color: #475569; margin-top: 14px; padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }
        
        /* Legend */
        .legend {
            position: absolute; top: 24px; right: 24px;
            background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px);
            padding: 12px 16px; border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10; font-size: 12px; color: #cbd5e1;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
        .legend-color { width: 16px; height: 16px; border-radius: 3px; border: 1px solid rgba(255, 255, 255, 0.2); }
        .legend-color.ban { background: #ef4444; }
        .legend-color.safe { background: #10b981; }
        
        /* Popup */
        .maplibregl-popup-content {
            background: rgba(15, 23, 42, 0.95); color: #fff; border-radius: 10px;
            padding: 12px 16px; border: 1px solid rgba(255, 255, 255, 0.1); font-size: 13px;
        }
        .maplibregl-popup-tip { border-top-color: rgba(15, 23, 42, 0.95); }
        .popup-title { font-weight: 600; margin-bottom: 4px; color: #e2e8f0; }
        .popup-status.on { color: #ef4444; }
        .popup-status.off { color: #10b981; }
        
        /* Controls */
        .maplibregl-ctrl-bottom-right { margin-bottom: 12px; margin-right: 12px; }
        
        /* Mobile */
        @media (max-width: 768px) {
            #ui-overlay {
                top: auto; bottom: 0; left: 0; right: 0; width: 100%; max-width: 100%;
                border-radius: 20px 20px 0 0; padding: 20px; max-height: 40vh;
                box-shadow: 0 -4px 20px rgba(0,0,0,0.4);
            }
            .legend { top: 12px; right: 12px; padding: 8px 12px; font-size: 11px; }
            .maplibregl-ctrl-bottom-right { margin-bottom: 45vh; margin-right: 12px; }
            h1 { font-size: 16px; }
        }
    </style>
</head>
<body>

<div id="ui-overlay">
    <div class="header">
        <div class="header-title">
            <div class="fire-icon">🔥</div>
            <div>
                <h1>Frontenac Fire Watch</h1>
                <div class="subtitle">Burn Ban Status</div>
            </div>
        </div>
        <button id="reset-view" class="reset-btn" style="display:none;" title="Clear Selection">✕</button>
    </div>
    <div id="status-list">Loading...</div>
    <div id="last-updated"></div>
</div>

<div class="legend">
    <div class="legend-item"><div class="legend-color ban"></div><span>Ban Active</span></div>
    <div class="legend-item"><div class="legend-color safe"></div><span>No Ban</span></div>
</div>

<div id="map"></div>

<script>
    const map = new maplibregl.Map({
        container: 'map',
        style: {
            version: 8,
            sources: {
                'carto-dark': {
                    type: 'raster',
                    tiles: ['https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png'],
                    tileSize: 256,
                    attribution: '© CartoDB © OpenStreetMap'
                }
            },
            layers: [{ id: 'carto-dark', type: 'raster', source: 'carto-dark', paint: { 'raster-opacity': 0.85 } }]
        },
        center: [-76.8107, 44.7806],
        zoom: 9,
        pitch: 0,
        bearing: 0
    });

    let currentPopup = null;
    let selectedTownshipKey = null;
    let allStatusData = {};

    map.on('load', async () => {
        // 1. Fetch Township Boundaries (WORKING VERSION)
        let townshipGeoJSON;
        const arcgisUrl = 'https://services2.arcgis.com/vJlmDE1PmdTcJF0N/arcgis/rest/services/Township_Boundaries/FeatureServer/0/query?where=1%3D1&outFields=*&outSR=4326&f=geojson';
        
        try {
            const response = await fetch(arcgisUrl);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            townshipGeoJSON = await response.json();
            console.log(`✅ Loaded ${townshipGeoJSON.features.length} townships.`);
        } catch (error) {
            console.error('❌ Failed to load GeoJSON:', error);
            document.getElementById('status-list').innerHTML = '<div style="color:#ef4444">Map data failed to load.</div>';
            return;
        }

        // 2. Fetch Fire Status
        try {
            const response = await fetch('fire_status.json');
            if (response.ok) allStatusData = await response.json();
        } catch (e) { console.warn("No fire_status.json found"); }

        // 3. Merge Status with GeoJSON
        townshipGeoJSON.features.forEach(feature => {
            const name = feature.properties.name 
                      || feature.properties.TOWNSHIP_NAME 
                      || feature.properties.Township 
                      || feature.properties.MUNICIPALITY 
                      || 'Unknown';
            
            const key = name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
            const status = allStatusData.municipalities[key]?.ban;
            const source = allStatusData.municipalities[key]?.source_url;
            
            feature.properties.status = status || 'UNKNOWN';
            feature.properties.displayName = name;
            feature.properties.matchKey = key;
            feature.properties.sourceUrl = source;
        });

        // 4. Add Source - EXPLICIT 'data' KEY (THE FIX)
        map.addSource('townships', {
            type: 'geojson',
            data: townshipGeoJSON
        });

        // 5. Add Base Fill Layer
        map.addLayer({
            id: 'township-fill',
            type: 'fill',
            source: 'townships',
            paint: {
                'fill-color': [
                    'match', ['get', 'status'],
                    'ON', '#ef4444',
                    'OFF', '#10b981',
                    '#475569'
                ],
                'fill-opacity': 0.75,
                'fill-outline-color': 'rgba(255, 255, 255, 0.3)'
            }
        });

        // 6. Add Highlight Layer (white border for selected)
        map.addLayer({
            id: 'township-highlight',
            type: 'line',
            source: 'townships',
            paint: {
                'line-color': '#ffffff',
                'line-width': 4,
                'line-blur': 1
            },
            filter: ['==', ['get', 'matchKey'], ''] // Start empty
        });

        // 7. Interactions
        map.on('click', 'township-fill', (e) => {
            if (e.features && e.features.length > 0) {
                const props = e.features[0].properties;
                selectTownship(props.matchKey);
            }
        });

        map.on('mousemove', 'township-fill', (e) => {
            map.getCanvas().style.cursor = 'pointer';
            if (e.features && e.features.length > 0 && !selectedTownshipKey) {
                showPopup(e.lngLat, e.features[0].properties);
            }
        });

        map.on('mouseleave', 'township-fill', () => {
            map.getCanvas().style.cursor = '';
            if (currentPopup && window.innerWidth > 768 && !selectedTownshipKey) {
                currentPopup.remove();
                currentPopup = null;
            }
        });

        updateSidebar(allStatusData);
        
        // Reset button
        document.getElementById('reset-view').addEventListener('click', () => {
            selectedTownshipKey = null;
            updateHighlight();
            document.getElementById('reset-view').style.display = 'none';
            document.querySelectorAll('.status-card').forEach(c => c.classList.remove('active'));
            if (currentPopup) { currentPopup.remove(); currentPopup = null; }
        });
    });

    function selectTownship(key) {
        selectedTownshipKey = key;
        updateHighlight();
        document.getElementById('reset-view').style.display = 'block';
        
        // Update sidebar cards
        document.querySelectorAll('.status-card').forEach(card => {
            card.classList.remove('active');
            if (card.dataset.key === key) {
                card.classList.add('active');
                card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        });
        
        // Remove popup when selecting
        if (currentPopup) { currentPopup.remove(); currentPopup = null; }
    }

    function updateHighlight() {
        if (map.getLayer('township-highlight')) {
            map.setFilter('township-highlight', 
                selectedTownshipKey 
                    ? ['==', ['get', 'matchKey'], selectedTownshipKey] 
                    : ['==', ['get', 'matchKey'], '']
            );
        }
    }

    function showPopup(lngLat, props) {
        const status = props.status;
        const statusText = status === 'ON' ? '🔴 Ban Active' : status === 'OFF' ? '🟢 No Ban' : '⚪ Unknown';
        const statusClass = status === 'ON' ? 'on' : status === 'OFF' ? 'off' : '';
        
        if (!currentPopup) {
            currentPopup = new maplibregl.Popup({ offset: 10, closeButton: false, anchor: 'bottom' });
        }
        
        currentPopup
            .setLngLat(lngLat)
            .setHTML(`<div class="popup-title">${props.displayName}</div><div class="popup-status ${statusClass}">${statusText}</div>`)
            .addTo(map);
    }

    function updateSidebar(data) {
        const container = document.getElementById('status-list');
        const dateEl = document.getElementById('last-updated');
        
        if (data.fetched_at) {
            const date = new Date(data.fetched_at);
            dateEl.textContent = `Updated: ${date.toLocaleString()}`;
        }

        let html = '';
        for (const [key, val] of Object.entries(data.municipalities)) {
            const name = key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
            const status = val.ban;
            const statusClass = status === 'ON' ? 'on' : status === 'OFF' ? 'off' : '';
            const statusText = status === 'ON' ? 'BAN ACTIVE' : status === 'OFF' ? 'NO BAN' : 'UNKNOWN';
            const sourceUrl = val.source_url;
            
            html += `
                <div class="status-card" data-key="${key}" onclick="selectTownship('${key}')">
                    <div class="status-header">
                        <span class="township-name">${name}</span>
                        <span class="status-badge ${statusClass}">
                            <span class="status-dot"></span>${statusText}
                        </span>
                    </div>
                    <div class="status-info">
                        ${sourceUrl ? `<a href="${sourceUrl}" target="_blank" onclick="event.stopPropagation()">View Source ↗</a>` : ''}
                    </div>
                </div>
            `;
        }
        container.innerHTML = html || '<div style="color:#94a3b8;font-size:13px">No status data available</div>';
    }

    map.addControl(new maplibregl.NavigationControl(), 'bottom-right');
</script>
</body>
</html>
