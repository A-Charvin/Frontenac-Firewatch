<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Frontenac Fire Watch</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: #0f172a;
            overflow: hidden;
        }
        
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        #ui-overlay {
            position: absolute; 
            top: 24px; 
            left: 24px; 
            z-index: 10;
            background: rgba(15, 23, 42, 0.7); 
            backdrop-filter: blur(16px);
            color: #fff; 
            padding: 24px; 
            border-radius: 16px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            min-width: 300px;
            max-width: 380px;
        }
        
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .fire-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #ef4444, #f97316);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        
        h1 { font-size: 18px; font-weight: 700; color: #fff; }
        .subtitle { font-size: 12px; color: #94a3b8; margin-top: 2px; }
        
        .status-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            padding: 14px;
            margin: 8px 0;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .status-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateX(3px);
        }
        
        /* Pulse animation for changes */
        .status-card.changed {
            animation: status-pulse 0.6s ease-out;
            border-color: rgba(59, 130, 246, 0.5);
        }
        
        @keyframes status-pulse {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.6); }
            70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
        
        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        
        .township-name {
            font-size: 14px;
            font-weight: 600;
            color: #e2e8f0;
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        
        .status-badge.on {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.25);
        }
        
        .status-badge.off {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.25);
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }
        
        .status-info {
            font-size: 12px;
            color: #94a3b8;
        }
        
        .status-info a {
            color: #64748b;
            text-decoration: none;
        }
        
        .status-info a:hover { color: #94a3b8; }
        
        #last-updated { 
            font-size: 11px; 
            color: #475569; 
            margin-top: 14px; 
            padding-top: 10px; 
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }
        
        /* Legend */
        .legend {
            position: absolute;
            top: 24px;
            right: 24px;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
            font-size: 12px;
            color: #cbd5e1;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 6px 0;
        }
        
        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 3px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .legend-color.ban { background: #ef4444; }
        .legend-color.safe { background: #10b981; }
        
        /* Debug Overlay */
        #debug-overlay {
            position: absolute;
            bottom: 24px;
            left: 24px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 11px;
            color: #94a3b8;
            min-width: 200px;
        }
        
        .debug-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin: 2px 0;
        }
        
        .debug-label { color: #64748b; }
        .debug-value { color: #e2e8f0; font-weight: 500; }
        
        /* Popup styling */
        .maplibregl-popup-content { 
            background: rgba(15, 23, 42, 0.95); 
            color: #fff; 
            border-radius: 10px; 
            padding: 12px 16px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 13px;
        }
        .maplibregl-popup-tip { border-top-color: rgba(15, 23, 42, 0.95); }
        .popup-title { font-weight: 600; margin-bottom: 4px; color: #e2e8f0; }
        .popup-status { color: #94a3b8; }
        .popup-status.on { color: #ef4444; }
        .popup-status.off { color: #10b981; }
        
        /* Map controls spacing */
        .maplibregl-ctrl-bottom-right {
            margin-bottom: 12px;
            margin-right: 12px;
        }
        .maplibregl-ctrl-bottom-left {
            margin-bottom: 12px;
            margin-left: 220px;
        }
    </style>
</head>
<body>

<div id="ui-overlay">
    <div class="header">
        <div class="fire-icon">🔥</div>
        <div>
            <h1>Frontenac Fire Watch</h1>
            <div class="subtitle">Burn Ban Status</div>
        </div>
    </div>
    <div id="status-list">Loading...</div>
    <div id="last-updated"></div>
</div>

<div class="legend">
    <div class="legend-item">
        <div class="legend-color ban"></div>
        <span>Ban Active</span>
    </div>
    <div class="legend-item">
        <div class="legend-color safe"></div>
        <span>No Ban</span>
    </div>
</div>

<!-- Debug Overlay -->
<!-- <div id="debug-overlay">
    <div class="debug-row">
        <span class="debug-label">Center:</span>
        <span class="debug-value" id="debug-center">--</span>
    </div>
    <div class="debug-row">
        <span class="debug-label">Zoom:</span>
        <span class="debug-value" id="debug-zoom">--</span>
    </div>
    <div class="debug-row" style="margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,0.05)">
        <span class="debug-label">Copy:</span>
        <span class="debug-value" style="cursor:pointer" id="debug-copy" title="Click to copy">[center, zoom]</span>
    </div>
</div> -->

<div id="map"></div>

<script>
    // 1. Initialize Map with your preferred coordinates
    const map = new maplibregl.Map({
        container: 'map',
        style: {
            version: 8,
            sources: {
                'carto-dark': {
                    type: 'raster',
                    tiles: [
                        'https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png',
                        'https://b.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png'
                    ],
                    tileSize: 256,
                    attribution: '© CartoDB © OpenStreetMap'
                }
            },
            layers: [{
                id: 'carto-dark',
                type: 'raster',
                source: 'carto-dark',
                paint: { 'raster-opacity': 0.85 }
            }]
        },
        // Updated coordinates and zoom
        center: [-76.8107, 44.7806],
        zoom: 9,
        pitch: 0,
        bearing: 0,
        antialias: true
    });

    // Global vars for popups and state
    let currentPopup = null;
    let previousStatus = {};

    map.on('load', async () => {
        // 2. Fetch Township Boundaries
        let townshipGeoJSON;
        const arcgisUrl = 'https://services2.arcgis.com/vJlmDE1PmdTcJF0N/arcgis/rest/services/Township_Boundaries/FeatureServer/0/query?where=1%3D1&outFields=*&f=geojson';
        
        try {
            const response = await fetch(arcgisUrl);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            townshipGeoJSON = await response.json();
            
            console.log(`✅ Loaded GeoJSON: ${townshipGeoJSON.features.length} townships found.`);
        } catch (error) {
            console.error('❌ Failed to load GeoJSON. Check console for CORS or network errors.');
            console.error(error);
            document.getElementById('status-list').innerHTML = '<div style="color:#ef4444">Map data failed to load.</div>';
            return;
        }

        // 3. Fetch Fire Status
        let statusData = { municipalities: {} };
        try {
            const response = await fetch('fire_status.json');
            if (response.ok) statusData = await response.json();
        } catch (e) {
            console.warn("⚠️ No local fire_status.json found");
        }

        // 4. Merge Status with GeoJSON
        townshipGeoJSON.features.forEach(feature => {
            // Handle various property names
            const name = feature.properties.name 
                      || feature.properties.TOWNSHIP_NAME 
                      || feature.properties.Township 
                      || feature.properties.MUNICIPALITY 
                      || 'Unknown';
            
            // Normalize key: "North Frontenac" -> "north_frontenac"
            const key = name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
            
            const status = statusData.municipalities[key]?.ban;
            feature.properties.status = status || 'UNKNOWN';
            feature.properties.displayName = name;
        });

        // 5. Add Source (Fixed syntax)
        map.addSource('townships', {
            type: 'geojson',
            data: townshipGeoJSON  // <-- This was missing before
        });

        // 6. Add Layer
        map.addLayer({
            id: 'township-fill',
            type: 'fill',
            source: 'townships',
            paint: {
                'fill-color': [
                    'match', ['get', 'status'],
                    'ON', '#ef4444',      // Red
                    'OFF', '#10b981',     // Green
                    '#475569'             // Grey (Unknown)
                ],
                'fill-opacity': 0.75,
                'fill-outline-color': 'rgba(255, 255, 255, 0.3)'
            }
        });

        // 7. Hover Interaction (Fixed Trailing Popups)
        map.on('mousemove', 'township-fill', (e) => {
            map.getCanvas().style.cursor = 'pointer';
            
            if (e.features && e.features.length > 0) {
                const props = e.features[0].properties;
                const status = props.status;
                const statusText = status === 'ON' ? '🔴 Ban Active' 
                                 : status === 'OFF' ? '🟢 No Ban' 
                                 : '⚪ Unknown';
                const statusClass = status === 'ON' ? 'on' : status === 'OFF' ? 'off' : '';
                
                // Reuse single popup instance
                if (!currentPopup) {
                    currentPopup = new maplibregl.Popup({ 
                        offset: 10, 
                        closeButton: false, 
                        anchor: 'bottom',
                        className: 'fire-popup'
                    });
                }
                
                currentPopup
                    .setLngLat(e.lngLat)
                    .setHTML(`
                        <div class="popup-title">${props.displayName}</div>
                        <div class="popup-status ${statusClass}">${statusText}</div>
                    `)
                    .addTo(map);
            }
        });

        map.on('mouseleave', 'township-fill', () => {
            map.getCanvas().style.cursor = '';
            if (currentPopup) {
                currentPopup.remove();
                currentPopup = null;
            }
        });

        // 8. Setup UI
        updateSidebar(statusData);
        setupDebugOverlay();
    });

    function updateSidebar(data) {
        const container = document.getElementById('status-list');
        const dateEl = document.getElementById('last-updated');
        
        if (data.fetched_at) {
            const date = new Date(data.fetched_at);
            dateEl.textContent = `Updated: ${date.toLocaleString()}`;
        }

        let html = '';
        for (const [key, val] of Object.entries(data.municipalities)) {
            const name = key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
            const status = val.ban;
            const statusClass = status === 'ON' ? 'on' : status === 'OFF' ? 'off' : '';
            const statusText = status === 'ON' ? 'BAN ACTIVE' : status === 'OFF' ? 'NO BAN' : 'UNKNOWN';
            const sourceUrl = val.source_url;
            
            // Animation check
            const changed = previousStatus[key] && previousStatus[key] !== status;
            const changeClass = changed ? 'changed' : '';
            
            html += `
                <div class="status-card ${changeClass}">
                    <div class="status-header">
                        <span class="township-name">${name}</span>
                        <span class="status-badge ${statusClass}">
                            <span class="status-dot"></span>
                            ${statusText}
                        </span>
                    </div>
                    <div class="status-info">
                        ${sourceUrl ? `<a href="${sourceUrl}" target="_blank">Source →</a>` : ''}
                    </div>
                </div>
            `;
            
            previousStatus[key] = status; // Update history
        }
        container.innerHTML = html || '<div style="color:#94a3b8;font-size:13px">No status data available</div>';
    }

    function setupDebugOverlay() {
        const centerEl = document.getElementById('debug-center');
        const zoomEl = document.getElementById('debug-zoom');
        const copyEl = document.getElementById('debug-copy');
        
        function updateDebug() {
            const center = map.getCenter();
            const zoom = map.getZoom();
            centerEl.textContent = `${center.lng.toFixed(4)}, ${center.lat.toFixed(4)}`;
            zoomEl.textContent = zoom.toFixed(2);
        }
        
        map.on('moveend', updateDebug);
        map.on('zoomend', updateDebug);
        updateDebug(); // Initial call
        
        // Copy logic
        copyEl.addEventListener('click', () => {
            const center = map.getCenter();
            const zoom = map.getZoom();
            const text = `center: [-76.8107, 44.7806], zoom: ${zoom.toFixed(2)}`;
            navigator.clipboard.writeText(text).then(() => {
                copyEl.textContent = '✓ Copied!';
                setTimeout(() => copyEl.textContent = '[center, zoom]', 1500);
            });
        });
    }

    // Controls
    map.addControl(new maplibregl.NavigationControl({ showCompass: true, showZoom: true }), 'bottom-right');
    map.addControl(new maplibregl.FullscreenControl(), 'bottom-right');
    map.addControl(new maplibregl.ScaleControl({ maxWidth: 100, unit: 'metric' }), 'bottom-left');
</script>
</body>
</html>
